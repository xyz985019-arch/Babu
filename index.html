<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ My Babu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff0844,#ff5e62,#8e2de2,#4a00e0);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:430px;
padding:35px;
text-align:center;
background:rgba(255,255,255,.15);
border-radius:25px;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.25);
box-shadow:0 0 40px rgba(0,0,0,.3);
color:#fff;
animation:float 4s ease-in-out infinite;
z-index:2;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

.profile{
width:140px;
height:140px;
border-radius:50%;
border:5px solid white;
margin:auto;
overflow:hidden;
box-shadow:0 0 25px white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
margin-top:20px;
font-size:38px;
}

#typing{
margin-top:15px;
font-size:19px;
min-height:70px;
line-height:30px;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:white;
color:#ff006e;
transition:.4s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px white;
}

.heart{
position:absolute;
bottom:-100px;
color:white;
animation:fly linear infinite;
opacity:.8;
}

@keyframes fly{
0%{
transform:translateY(0) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="card">

<div class="profile">
<img src="YOUR_PHOTO_URL_HERE">
</div>

<h1>❤️ My Babu ❤️</h1>

<p id="typing"></p>

<button id="loveBtn">
Open Surprise 🎁
</button>

</div>

<!-- JavaScript Part 2 mein add hoga -->

</body>
  </html>
